spring.application.name=ProjetoEstagio

# Configuracoes do Banco de Dados PostgreSQL (Conectando ao Container)
spring.datasource.url=jdbc:postgresql://postgres-db:5432/acompanhamento_curso
spring.datasource.username=postgres
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuracoes de Seguranca / JWT
jwt.secret=MINHA_CHAVE_SUPER_SECRETA_123456789123456789
jwt.issuer=MeuAuthServer
jwt.audience=MeuSistema

# INTEGRACAO COM AWS (LOCALSTACK)

# Credenciais ficticias exigidas pelo SDK da AWS
spring.cloud.aws.credentials.access-key=test
spring.cloud.aws.credentials.secret-key=test
spring.cloud.aws.region.static=us-east-1

# Redireciona os servicos do Spring Cloud AWS para o container localstack
spring.cloud.aws.s3.endpoint=http://localstack:4566
spring.cloud.aws.sqs.endpoint=http://localstack:4566

# Configuracao essencial para que o S3 funcione localmente no Docker
spring.cloud.aws.s3.path-style-access-enabled=true
